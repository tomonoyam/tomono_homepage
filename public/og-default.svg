<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06060f"/>
      <stop offset="100%" style="stop-color:#0d1b4b"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00d4ff" stroke-width="0.3" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Radial glow center -->
  <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.12"/>
    <stop offset="100%" style="stop-color:#06060f;stop-opacity:0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#center-glow)"/>

  <!-- Magic circle (decorative) -->
  <g transform="translate(1050, 315)" opacity="0.15" filter="url(#glow)">
    <circle cx="0" cy="0" r="220" stroke="#00d4ff" stroke-width="0.8" fill="none"/>
    <circle cx="0" cy="0" r="180" stroke="#7c3aed" stroke-width="0.5" fill="none" stroke-dasharray="8 4"/>
    <circle cx="0" cy="0" r="140" stroke="#00d4ff" stroke-width="0.4" fill="none"/>
    <polygon points="0,-200 173,-100 173,100 0,200 -173,100 -173,-100" stroke="#00d4ff" stroke-width="0.5" fill="none"/>
    <line x1="0" y1="-220" x2="0" y2="220" stroke="#00d4ff" stroke-width="0.3"/>
    <line x1="-220" y1="0" x2="220" y2="0" stroke="#00d4ff" stroke-width="0.3"/>
  </g>

  <!-- Top label -->
  <text x="80" y="95" font-family="monospace" font-size="18" fill="#00d4ff" opacity="0.7" letter-spacing="6">✦ AUTOSAR.MAGIC</text>

  <!-- Divider -->
  <line x1="80" y1="115" x2="360" y2="115" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>

  <!-- Main title -->
  <text x="80" y="240" font-family="Georgia, serif" font-size="72" font-weight="600" fill="white">AUTOSARは、</text>
  <text x="80" y="330" font-family="Georgia, serif" font-size="72" font-weight="600" fill="url(#title-grad)">車に宿る魔法体系</text>
  <text x="80" y="420" font-family="Georgia, serif" font-size="72" font-weight="600" fill="white">である。</text>

  <!-- Subtitle -->
  <text x="80" y="490" font-family="sans-serif" font-size="22" fill="#9ca3af" letter-spacing="1">CAN通信、BSW、RTE、SWC。見えない制御の世界を、魔法の言葉で読み解く。</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#06060f" opacity="0.6"/>
  <line x1="0" y1="590" x2="1200" y2="590" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
  <text x="80" y="614" font-family="monospace" font-size="14" fill="#00d4ff" opacity="0.5">tomono-homepage.vercel.app</text>
  <text x="1100" y="614" font-family="monospace" font-size="14" fill="#00d4ff" opacity="0.5" text-anchor="end">8章 · 24記事</text>
</svg>
